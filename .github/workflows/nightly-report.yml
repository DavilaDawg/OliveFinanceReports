name: Nightly Report

on:
  schedule:
    - cron: '0 4 * * *' # runs at 4:00 AM UTC (12am AST) every day 
  workflow_dispatch:        # lets you also trigger it manually from GitHub's UI, for testing

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run main
        env:
          REPORTS_EMAIL_ADDRESS: ${{ secrets.REPORTS_EMAIL_ADDRESS }}
          REPORTS_EMAIL_APP_PASSWORD: ${{ secrets.REPORTS_EMAIL_APP_PASSWORD }}
        run: python main.py